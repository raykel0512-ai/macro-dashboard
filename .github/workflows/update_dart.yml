name: Update DART Financials

on:
  # 매주 일요일 새벽 4시 KST (UTC 19:00 토)
  schedule:
    - cron: '0 19 * * 6'
  
  # 수동 실행도 가능 (GitHub Actions 탭에서)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase
      
      - name: Run DART updater
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/dart_updater.py
